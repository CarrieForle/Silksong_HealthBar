name: Build and release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      force_release:
        description: Force releaseing to GitHub
        default: false
        type: boolean
    
permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is-new-version: ${{ !fromJSON(steps.needs-release.outputs.exists || 'true') }}
      attestation-url: ${{ steps.attest.outputs.attestation-url }}
      artifact-id: ${{ steps.artifact.outputs.artifact-id }}

    steps:
    - uses: actions/checkout@v7
    - name: Setup .NET
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: 10.x
    - name: Build
      run: dotnet build -c Release --verbosity normal
    - name: Get Version
      id: version
      run: |-
        VERSION=$(dotnet build Silksong_HealthBar/Silksong_HealthBar.csproj -getProperty:Version)
        echo Version is $VERSION
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: Check if release needed
      id: needs-release
      uses: mukunku/tag-exists-action@v1.7.0
      if: github.event_name == 'push'
      with:
        tag: v${{ steps.version.outputs.version }}
    - name: Upload artifact
      id: artifact
      uses: actions/upload-artifact@v7
      with:
        name: XiaohaiMod-ShowDamage_HealthBar
        path: |
          Silksong_HealthBar/bin/Release/netstandard2.1/*.dll
          Silksong_HealthBar/bin/Release/netstandard2.1/*.pdb
    - name: Generate attestation
      id: attest
      uses: actions/attest@v4
      if: github.event_name == 'push' && steps.needs-release.outputs.exists == 'false'
      with:
        subject-path: |
          Silksong_HealthBar/bin/Release/netstandard2.1/*.dll
          Silksong_HealthBar/bin/Release/netstandard2.1/*.pdb
  
  # Publish to GitHub releases to keep release history on the repository (needed for this workflow to work properly
  # but is also nice for multiple other reasons such as auto-tagging *after* a build success)
  release-github:
    needs:
      - build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && needs.build.outputs.is-new-version == 'true' || inputs.force_release
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v8
      with:
        artifact-ids: ${{ needs.build.outputs.artifact-id }}
        skip-decompress: true
    - name: Release
      uses: softprops/action-gh-release@v3
      with:
        draft: false
        generate_release_notes: true
        fail_on_unmatched_files: true
        tag_name: v${{ needs.build.outputs.version }}
        body: |
          Build attested at ${{ needs.build.outputs.attestation-url }}
        files: |
          *.zip
